<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIMS | Abdulrauf Institute of Mind Sciences</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --deep-ocean: #263238; --forest-heal: #004d40; --text-main: #37474f; --soft-gray: #eceff1; --white: #ffffff; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--soft-gray); margin: 0; color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }
        header { background: linear-gradient(135deg, var(--deep-ocean) 0%, var(--forest-heal) 100%); padding: 40px 20px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo-text { font-size: 32px; font-weight: 700; color: #fff; letter-spacing: -1.5px; }
        .logo-sub { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.7); display: block; margin-top: 5px; }
        .container { max-width: 450px; margin: -30px auto 0 auto; padding: 20px; flex-grow: 1; width: 100%; box-sizing: border-box; }
        .card { background: var(--white); border-radius: 25px; padding: 22px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(0,0,0,0.03); text-decoration: none; color: inherit; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .card:active { transform: scale(0.96); }
        .card-icon { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .icon-nlp { background: #e0f2f1; color: #00695c; }
        .icon-hypno { background: #ede7f6; color: #512da8; }
        .icon-coach { background: #fff3e0; color: #e65100; }
        .icon-audio { background: #fce4ec; color: #d81b60; }
        .card-text b { display: block; font-size: 16px; margin-bottom: 2px; color: var(--deep-ocean); }
        .card-text span { font-size: 12px; color: #607d8b; }
        .form-section { display: none; background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h3 { font-size: 22px; color: var(--deep-ocean); margin-bottom: 25px; text-align: center; }
        label { display: block; font-size: 11px; font-weight: 700; color: #90a4ae; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 16px; border: 1.5px solid #eee; border-radius: 15px; margin-bottom: 18px; font-size: 14px; box-sizing: border-box; font-family: inherit; }
        #logic-box { background: #f1f8e9; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px dashed var(--forest-heal); display: none; }
        .btn-main { background: var(--forest-heal); color: white; padding: 20px; width: 100%; border: none; border-radius: 18px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .btn-back { border: none; background: none; color: #90a4ae; margin-bottom: 20px; cursor: pointer; font-weight: 600; }
        .footer { text-align: center; padding: 40px 0 130px 0; color: #b0bec5; font-size: 10px; text-transform: uppercase; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; justify-content: space-around; padding: 15px 0 35px 0; border-top: 1px solid #eee; z-index: 1000; border-top-left-radius: 30px; border-top-right-radius: 30px; }
        .nav-link { text-align: center; text-decoration: none; color: #b0bec5; font-size: 10px; font-weight: 700; flex: 1; }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 5px; }
        .nav-link.active { color: var(--forest-heal); }
    </style>
</head>
<body>

<header>
    <div class="logo-text">AIMS</div>
    <div class="logo-sub">Abdulrauf Institute of Mind Sciences</div>
</header>

<div class="container">
    <div id="home-screen">
        <div class="card" onclick="runLogic('NLP Breakthrough')">
            <div class="card-icon icon-nlp"><i class="fas fa-brain"></i></div>
            <div class="card-text"><b>NLP Coaching</b><span>Reprogram your mind for success</span></div>
        </div>
        <div class="card" onclick="runLogic('Hypnotherapy')">
            <div class="card-icon icon-hypno"><i class="fas fa-eye"></i></div>
            <div class="card-text"><b>Hypnotherapy</b><span>Deep subconscious healing sessions</span></div>
        </div>
        <div class="card" onclick="runLogic('Life Coaching')">
            <div class="card-icon icon-coach"><i class="fas fa-compass"></i></div>
            <div class="card-text"><b>Life Coaching</b><span>Strategic tools for your future</span></div>
        </div>
        <a href="https://wa.me/923005364319?text=*RESOURCE ACCESS REQUEST*" class="card">
            <div class="card-icon icon-audio"><i class="fas fa-headphones-alt"></i></div>
            <div class="card-text"><b>Audio Library</b><span>Guided meditations & calm audio</span></div>
        </a>
    </div>

    <div id="booking-form" class="form-section">
        <button class="btn-back" onclick="showHome()"><i class="fas fa-arrow-left"></i> BACK</button>
        <h3 id="service-title">Request Appointment</h3>
        
        <label>Selected Service</label>
        <select id="main-service-select" onchange="runLogic(this.value)">
            <option value="NLP Breakthrough">NLP Breakthrough</option>
            <option value="Hypnotherapy">Hypnotherapy</option>
            <option value="Life Coaching">Life Coaching</option>
        </select>
        
        <label>Full Name</label>
        <input type="text" id="client-name" placeholder="Enter your name">
        
        <label>WhatsApp Number</label>
        <input type="tel" id="client-phone" placeholder="03XXXXXXXXX">

        <div id="logic-box">
            <label id="logic-label">Special Question</label>
            <input type="text" id="logic-answer" placeholder="Your answer...">
        </div>
        
        <label>Preferred Session Mode</label>
        <select id="session-mode">
            <option value="Online (Video Call)">Online (Video Call)</option>
            <option value="In-Person (Clinic)">In-Person (Clinic)</option>
        </select>

        <label>What is your primary goal?</label>
        <textarea id="client-goal" rows="3" placeholder="Briefly describe what you want to achieve..."></textarea>
        
        <button class="btn-main" onclick="submitBooking()">Submit Request</button>
    </div>
    <div class="footer">AIMS CONSULTANCY • GUJAR KHAN</div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-link active" onclick="showHome()"><i class="fas fa-home"></i><span>HOME</span></a>
    <a href="tel:923005364319" class="nav-link"><i class="fas fa-phone-alt"></i><span>CALL</span></a>
    <a href="https://wa.me/923005364319" class="nav-link"><i class="fab fa-whatsapp"></i><span>CHAT</span></a>
</div>

<script>
    const MY_WHATSAPP = "923005364319";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqgxPJXnGiVndINcc8OoeuKAtDx5VYd0iasv0LvxAeK16p2Eg_NgurUKVlbouH3zVWNQ/exec";

    function runLogic(serviceName) {
        // Switch views
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('booking-form').style.display = 'block';
        
        // Sync the dropdown and title
        document.getElementById('main-service-select').value = serviceName;
        document.getElementById('service-title').innerText = "Book " + serviceName;
        
        // Logic elements
        const box = document.getElementById('logic-box');
        const label = document.getElementById('logic-label');
        const input = document.getElementById('logic-answer');

        // Apply Logic
        if(serviceName === 'Hypnotherapy') {
            box.style.display = 'block';
            label.innerText = "Have you experienced hypnosis before?";
            input.placeholder = "Yes/No (and any specific concerns)";
        } else if (serviceName === 'NLP Breakthrough') {
            box.style.display = 'block';
            label.innerText = "What is the biggest mental block you face?";
            input.placeholder = "e.g. Anxiety, public speaking, habits...";
        } else {
            box.style.display = 'none';
            input.value = "N/A"; 
        }
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('booking-form').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
    }

    async function submitBooking() {
        const service = document.getElementById('main-service-select').value;
        const name = document.getElementById('client-name').value;
        const phone = document.getElementById('client-phone').value;
        const mode = document.getElementById('session-mode').value;
        const goal = document.getElementById('client-goal').value;
        const extra = document.getElementById('logic-answer').value;

        if(!name || !phone) { alert("Please provide your name and number."); return; }

        try {
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ service, name, phone, mode, goal, extra })
            });
        } catch (e) { console.log(e); }

        const msg = `*AIMS CONSULTANCY REQUEST*%0A%0A*Service:* ${service}%0A*Client:* ${name}%0A*Phone:* ${phone}%0A*Mode:* ${mode}%0A*Special Info:* ${extra}%0A*Goal:* ${goal}`;
        window.open(`https://wa.me/${MY_WHATSAPP}?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
