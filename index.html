<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.4); /* Reduced opacity for more see-through look */
        --glass-border: rgba(255, 255, 255, 0.2);
        --text-primary: #1c1c1c; /* Dark charcoal for premium contrast */
        --text-secondary: #2f4f4f; /* Dark teal for subtle professional touch */
        --accent: #e0f7fa;
    }

    body {
        /* Contextual therapy/meditation image with face silhouettes overlay */
        background-image: url('therapy_silhouettes.jpg'); /* You will need an appropriate image */
        background-size: cover;
        background-position: center;
        font-family: 'Montserrat', 'Inter', sans-serif; /* Cleaner, premium font */
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        margin: 0;
    }

    .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px); /* Doubled the blur for profound depth */
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15); /* Softer, deeper shadow */
        padding: 50px 40px;
        width: 100%;
        max-width: 480px;
        text-align: center;
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
        position: relative; /* Setup for hover glow */
    }

    .glass-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 28px;
        box-shadow: 0 0 100px var(--accent) inset;
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    .glass-card:hover {
        transform: translateY(-8px) scale(1.01);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.2);
    }

    .glass-card:hover::before {
        opacity: 0.15;
    }

    .profile-img {
        width: 160px; /* Slightly larger image */
        height: 160px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #fff;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        margin-bottom: 25px;
    }

    .main-title {
        font-size: 1.5rem;
        color: var(--text-primary);
        margin: 8px 0;
        font-weight: 700;
        letter-spacing: -0.5px;
        line-height: 1.1;
    }

    .sub-tagline {
        font-size: 1.05rem;
        color: var(--text-secondary);
        margin-top: 12px;
        font-weight: 500;
        font-style: italic; /* Emphasizes the psychological aspect */
    }

    .service-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 35px;
    }

    .service-pill {
        background: rgba(255, 255, 255, 0.3); /* Even softer pills */
        padding: 12px 8px;
        border-radius: 16px;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-secondary);
        border: 1px solid var(--glass-border);
        transition: background 0.3s ease, transform 0.2s ease;
    }

    .service-pill:hover {
        background: rgba(255, 255, 255, 0.6);
        transform: scale(1.05);
    }
</style>

<div class="glass-card">
    <img src="new-logo.jpeg" alt="Abdul Rauf" class="profile-img">
    
    <div class="main-title">
        Psychologist, NLP Life Coach & Hypnotherapist
    </div>
    <div class="sub-tagline">
        Helping you unlock the power of your subconscious mind
    </div>

    <div class="service-container">
        <div class="service-pill">NLP Coaching</div>
        <div class="service-pill">Hypnotherapy</div>
        <div class="service-pill">Psychotherapy</div>
    </div>
</div>
